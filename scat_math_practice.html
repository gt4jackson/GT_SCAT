<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SCAT Math Practice вҖ” 10 Tests + Study Guide</title>
<meta name="theme-color" content="#5b21b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCAT Math">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bl:#5b21b6;--bll:#ede9fe;--gr:#059669;--grl:#d1fae5;--rd:#ef4444;--rdl:#fee2e2;--yl:#f59e0b;--yll:#fef3c7;--gy:#6b7280;--gyl:#f9fafb;--bd:#e5e7eb;--tx:#1f2937;--wh:#fff;--sky:#0ea5e9;--skyl:#e0f2fe;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(145deg,#f5f3ff 0%,#eff6ff 100%);background-attachment:fixed;color:var(--tx);font-size:15px;min-height:100vh;}

/* в”Җв”Җ HEADER в”Җв”Җ */
.hdr{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 55%,#a855f7 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 4px 18px rgba(91,33,182,.4);}
.hdr h1{font-size:1.18rem;font-weight:800;letter-spacing:-.01em;}
.hdr small{font-size:.75rem;opacity:.88;display:block;margin-top:2px;}
.upd-btn{background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.45);color:#fff;padding:7px 14px;border-radius:99px;font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.upd-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.04);}
.upd-btn .spin{display:inline-block;}.upd-btn.spinning .spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.upd-banner{background:linear-gradient(135deg,#059669,#10b981);color:#fff;text-align:center;padding:9px 16px;font-size:.87rem;font-weight:700;display:none;gap:12px;align-items:center;justify-content:center;}
.upd-banner.show{display:flex;}
.upd-banner button{background:white;color:#059669;border:none;padding:5px 14px;border-radius:99px;font-weight:800;cursor:pointer;font-size:.82rem;}

/* в”Җв”Җ TABS в”Җв”Җ */
.tabs{background:#fff;border-bottom:2px solid var(--bd);display:flex;overflow-x:auto;padding:0 12px;gap:2px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.tab{padding:12px 14px;cursor:pointer;font-weight:700;font-size:.8rem;border-bottom:3px solid transparent;color:var(--gy);white-space:nowrap;transition:all .15s;border-radius:6px 6px 0 0;}
.tab:hover{color:#5b21b6;background:#f5f3ff;}
.tab.on{color:#5b21b6;border-bottom-color:#5b21b6;background:#f5f3ff;}
.tab.sg{color:#7c3aed;}
.tab.sg.on{border-bottom-color:#7c3aed;color:#7c3aed;background:#f5f3ff;}
.tab.pm{color:#0891b2;}
.tab.pm.on{border-bottom-color:#0891b2;color:#0891b2;background:#f0fdfe;}

/* в”Җв”Җ LAYOUT в”Җв”Җ */
.main{display:flex;min-height:calc(100vh - 108px);}

/* в”Җв”Җ SIDEBAR в”Җв”Җ */
.sb{width:195px;background:#fff;border-right:2px solid var(--bd);padding:14px;flex-shrink:0;overflow-y:auto;}
.sb h3{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gy);margin-bottom:10px;font-weight:800;}
.tmr{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-radius:14px;padding:12px;text-align:center;margin-bottom:12px;border:2px solid #c4b5fd;}
.tmr-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:#5b21b6;font-weight:800;}
.tmr-val{font-size:1.8rem;font-weight:800;color:#5b21b6;font-variant-numeric:tabular-nums;}
.tmr.warn .tmr-val{color:var(--yl);}
.tmr.dng .tmr-val{color:var(--rd);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pgbar{height:9px;background:var(--bd);border-radius:99px;margin-bottom:4px;overflow:hidden;}
.pgfill{height:100%;background:linear-gradient(90deg,#5b21b6,#a855f7);border-radius:99px;transition:width .3s;}
.pglbl{font-size:.7rem;color:var(--gy);font-weight:600;margin-bottom:12px;}
.qgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.qb{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;border:2px solid var(--bd);border-radius:7px;cursor:pointer;background:#fff;transition:all .12s;}
.qb:hover{border-color:#5b21b6;color:#5b21b6;transform:scale(1.1);}
.qb.cur{background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(91,33,182,.45);}
.qb.ans{background:var(--bll);color:#5b21b6;border-color:#a78bfa;}
.qb.ans.cur{background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;border-color:transparent;}
.qb.ok{background:var(--grl);color:var(--gr);border-color:#6ee7b7;}
.qb.ng{background:var(--rdl);color:var(--rd);border-color:#fca5a5;}

/* в”Җв”Җ QUESTION AREA в”Җв”Җ */
.qa{flex:1;padding:20px;max-width:780px;}
.qcard{background:#fff;border-radius:18px;box-shadow:0 4px 20px rgba(91,33,182,.1);padding:24px;margin-bottom:16px;border:2px solid #e9d5ff;animation:slideIn .22s ease-out;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qnum{font-size:.75rem;color:var(--gy);font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.qcond{background:linear-gradient(135deg,#fef3c7,#fde68a);border-left:4px solid var(--yl);padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:.9rem;font-style:italic;color:#78350f;font-weight:600;border:1.5px solid #fcd34d;}

/* в”Җв”Җ COLUMN A / B TABLE в”Җв”Җ */
.ctbl{width:100%;border-collapse:collapse;margin:6px 0 20px;}
.ctbl th{padding:11px 18px;font-size:.88rem;font-weight:800;text-align:center;color:#fff;}
.ctbl th:nth-child(1){background:linear-gradient(135deg,#d97706,#f59e0b);border-radius:10px 0 0 0;}
.ctbl th:nth-child(3){background:linear-gradient(135deg,#0284c7,#0ea5e9);border-radius:0 10px 0 0;}
.ctbl td{padding:20px 22px;text-align:center;border:1.5px solid var(--bd);font-size:1.1rem;font-weight:600;vertical-align:middle;min-width:160px;}
.ca{background:#fffbeb;}
.cb{background:#f0f9ff;}
.vs{font-size:.8rem;font-weight:800;color:var(--gy);padding:0 6px;border:none !important;background:#f9fafb;}

/* в”Җв”Җ ANSWER CHOICES в”Җв”Җ */
.choices{display:grid;gap:10px;}
.ch{padding:13px 18px;border:2.5px solid var(--bd);border-radius:13px;cursor:pointer;font-size:.9rem;text-align:left;background:#fff;transition:all .15s;display:flex;align-items:flex-start;gap:12px;font-weight:500;}
.ch:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.13);}
.ch.sel{border-color:#5b21b6;background:var(--bll);transform:translateY(-1px);box-shadow:0 3px 12px rgba(91,33,182,.22);}
.ch.ok{border-color:var(--gr);background:var(--grl);}
.ch.ng{border-color:var(--rd);background:var(--rdl);}
.chl{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0;color:#fff;}
/* A=amber  B=sky  C=green  D=violet */
.ch:nth-child(1) .chl{background:linear-gradient(135deg,#d97706,#f59e0b);}
.ch:nth-child(2) .chl{background:linear-gradient(135deg,#0284c7,#0ea5e9);}
.ch:nth-child(3) .chl{background:linear-gradient(135deg,#059669,#10b981);}
.ch:nth-child(4) .chl{background:linear-gradient(135deg,#5b21b6,#7c3aed);}
.ch.sel .chl{background:linear-gradient(135deg,#4c1d95,#5b21b6);box-shadow:0 2px 6px rgba(91,33,182,.4);}
.ch.ok .chl{background:linear-gradient(135deg,#059669,#10b981);}
.ch.ng .chl{background:linear-gradient(135deg,#b91c1c,#ef4444);}

/* в”Җв”Җ BUTTONS в”Җв”Җ */
.navrow{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.btn{padding:10px 22px;border-radius:99px;font-size:.88rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn-o{background:#fff;border:2.5px solid var(--bd);color:var(--tx);}
.btn-o:hover{border-color:#5b21b6;color:#5b21b6;box-shadow:0 3px 10px rgba(0,0,0,.1);}
.btn-p{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;box-shadow:0 4px 14px rgba(91,33,182,.38);}
.btn-p:hover{box-shadow:0 6px 20px rgba(91,33,182,.48);background:linear-gradient(135deg,#4338ca,#6d28d9);}
.btn-d{background:linear-gradient(135deg,#b91c1c,#ef4444);color:#fff;box-shadow:0 3px 10px rgba(239,68,68,.32);}
.btn-d:hover{box-shadow:0 5px 15px rgba(239,68,68,.44);}
.sp{flex:1;}

/* в”Җв”Җ START SCREEN в”Җв”Җ */
.start{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 108px);padding:20px;}
.startcard{background:#fff;border-radius:22px;padding:36px;max-width:520px;width:100%;text-align:center;box-shadow:0 10px 36px rgba(91,33,182,.17);border:3px solid #e9d5ff;}
.startcard h2{font-size:1.55rem;margin-bottom:6px;color:#4c1d95;font-weight:800;}
.startcard p{color:var(--gy);font-size:.92rem;line-height:1.65;margin-bottom:6px;}
.rules{text-align:left;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:14px;padding:14px 18px;margin:14px 0;font-size:.86rem;line-height:1.95;border:2px solid #ddd6fe;}

/* в”Җв”Җ RESULTS в”Җв”Җ */
.results{padding:20px;max-width:860px;margin:0 auto;}
.scorecard{background:#fff;border-radius:18px;padding:28px;text-align:center;margin-bottom:20px;box-shadow:0 4px 18px rgba(91,33,182,.12);border:2px solid #e9d5ff;}
.circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;font-weight:700;}
.pct{font-size:2.1rem;font-weight:800;}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.stat{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:12px;padding:12px 20px;text-align:center;border:1.5px solid #ddd6fe;}
.stn{font-size:1.45rem;font-weight:800;}
.stl{font-size:.72rem;color:var(--gy);font-weight:600;}
.rlist{display:grid;gap:10px;}
.ri{background:#fff;border-radius:13px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid var(--bd);}
.ri.ok{border-left-color:var(--gr);}
.ri.ng{border-left-color:var(--rd);}
.ri.sk{border-left-color:var(--yl);}
.rihdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.riqn{font-size:.74rem;font-weight:800;text-transform:uppercase;color:var(--gy);}
.badge{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:99px;}
.bok{background:var(--grl);color:var(--gr);}
.bng{background:var(--rdl);color:var(--rd);}
.bsk{background:var(--yll);color:#78350f;}
.ricmp{display:flex;gap:10px;font-size:.87rem;margin-bottom:8px;}
.rcol{flex:1;padding:8px 12px;border-radius:9px;}
.rca{background:#fffbeb;border:1.5px solid #fde68a;}
.rcb{background:#f0f9ff;border:1.5px solid #bae6fd;}
.rclbl{font-size:.65rem;font-weight:800;color:var(--gy);text-transform:uppercase;}
.rexp{font-size:.84rem;color:#374151;line-height:1.55;background:linear-gradient(135deg,#f9fafb,#f5f3ff);padding:10px 14px;border-radius:9px;border:1.5px solid #e9d5ff;}

/* в”Җв”Җ PRACTICE MODE в”Җв”Җ */
.prac-start{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 108px);padding:20px;}
.prac-card{background:#fff;border-radius:22px;padding:32px;max-width:600px;width:100%;box-shadow:0 10px 36px rgba(91,33,182,.17);border:3px solid #e9d5ff;}
.prac-card h2{color:#4c1d95;font-size:1.35rem;margin-bottom:6px;font-weight:800;}
.prac-card p{color:var(--gy);font-size:.9rem;line-height:1.65;margin-bottom:10px;}
.tfilt{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 18px;}
.tchip{padding:6px 14px;border-radius:99px;font-size:.75rem;font-weight:700;cursor:pointer;border:2.5px solid transparent;transition:all .14s;white-space:nowrap;}
.tchip:hover{transform:scale(1.06);}
.tchip.on{opacity:1;border-color:rgba(0,0,0,.2);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.tchip.off{opacity:.32;}
.prac-wrap{display:flex;min-height:calc(100vh - 108px);}
.prac-sb{width:200px;background:#fff;border-right:2px solid var(--bd);padding:14px;flex-shrink:0;overflow-y:auto;}
.prac-sb h3{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gy);margin-bottom:8px;font-weight:800;}
.pscore{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-radius:14px;padding:12px;text-align:center;margin-bottom:10px;border:2px solid #c4b5fd;}
.pscore .pv{font-size:1.8rem;font-weight:800;color:#4c1d95;}
.pscore .pl{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:#5b21b6;font-weight:700;}
.pstreak{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:14px;padding:10px;text-align:center;margin-bottom:10px;border:2px solid #fcd34d;}
.pstreak .sv{font-size:1.45rem;font-weight:800;color:#78350f;}
.pstreak .sl{font-size:.65rem;text-transform:uppercase;color:#92400e;font-weight:700;}
.acc-row{margin-bottom:6px;}
.acc-lbl{font-size:.68rem;color:var(--gy);display:flex;justify-content:space-between;margin-bottom:2px;font-weight:600;}
.acc-bar{height:6px;background:var(--bd);border-radius:99px;overflow:hidden;}
.acc-fill{height:100%;border-radius:99px;}
.prac-qa{flex:1;padding:20px;max-width:780px;}
.hint-area{margin-top:10px;}
.hstep{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-left:4px solid #7c3aed;padding:11px 15px;border-radius:9px;margin-bottom:6px;font-size:.87rem;color:#3b0764;line-height:1.6;}
.hbtn{background:#fff;border:2.5px solid #7c3aed;color:#7c3aed;padding:8px 16px;border-radius:99px;font-size:.82rem;font-weight:700;cursor:pointer;margin-right:6px;margin-top:8px;transition:all .14s;}
.hbtn:hover{background:var(--bll);transform:scale(1.05);}
.hbtn:disabled{opacity:.28;cursor:default;transform:none;}
.enc-ok{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:2px solid #6ee7b7;border-radius:13px;padding:13px 18px;margin-top:12px;font-size:.93rem;color:#064e3b;font-weight:700;}
.enc-ng{background:linear-gradient(135deg,#fee2e2,#fecaca);border:2px solid #fca5a5;border-radius:13px;padding:13px 18px;margin-top:12px;font-size:.93rem;color:#7f1d1d;font-weight:700;}
.pexp{margin-top:12px;background:linear-gradient(135deg,#f9fafb,#f5f3ff);border-radius:11px;padding:14px;font-size:.87rem;color:#374151;line-height:1.6;border:1.5px solid #e9d5ff;}
.slbtn{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;padding:8px 16px;border-radius:99px;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .15s;}
.slbtn:hover{transform:scale(1.06);box-shadow:0 4px 12px rgba(91,33,182,.38);}
.psum-wrap{padding:24px;max-width:780px;margin:0 auto;}
.psum-card{background:#fff;border-radius:16px;padding:26px;margin-bottom:16px;box-shadow:0 4px 18px rgba(91,33,182,.1);border:2px solid #e9d5ff;}
.psum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:12px;}
.psum-stat{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:11px;padding:12px;text-align:center;border:1.5px solid #ddd6fe;}
.psum-stat .psn{font-size:1.65rem;font-weight:800;}
.psum-stat .psl{font-size:.72rem;color:var(--gy);font-weight:600;}
.focus-box{background:linear-gradient(135deg,#e0f2fe,#dbeafe);border-left:4px solid #0ea5e9;padding:14px 18px;border-radius:11px;margin-top:12px;font-size:.89rem;color:#0c4a6e;line-height:1.55;border:1.5px solid #bae6fd;}

/* в”Җв”Җ XP / LEVEL BADGE в”Җв”Җ */
.lv-badge{display:flex;align-items:center;gap:10px;padding:11px 14px;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:2px solid #c4b5fd;border-radius:13px;margin-bottom:10px;}
.lv-icon{font-size:1.45rem;}
.lv-info{flex:1;min-width:0;}
.lv-name{font-size:.8rem;font-weight:800;color:#4c1d95;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lv-xprow{font-size:.66rem;color:var(--gy);margin-top:1px;font-weight:600;}
.xp-wrap{background:var(--bd);border-radius:99px;height:9px;margin-top:5px;overflow:hidden;}
.xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#5b21b6,#a855f7,#ec4899);transition:width .6s;}

/* в”Җв”Җ BADGES в”Җв”Җ */
.bdg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.bdg{padding:8px 4px;border-radius:10px;text-align:center;border:2px solid var(--bd);background:#fff;cursor:default;position:relative;transition:transform .15s;}
.bdg.unlocked{border-color:#7c3aed;background:linear-gradient(135deg,#f5f3ff,#ede9fe);box-shadow:0 2px 10px rgba(124,58,237,.22);}
.bdg.unlocked:hover{transform:scale(1.1);}
.bdg.locked{opacity:.2;filter:grayscale(1);}
.bdg-ic{font-size:1.3rem;line-height:1;}
.bdg-nm{font-size:.56rem;font-weight:700;color:var(--tx);margin-top:3px;line-height:1.2;}

/* в”Җв”Җ LEVEL-UP OVERLAY в”Җв”Җ */
.lvup-ov{position:fixed;inset:0;background:rgba(10,0,40,.82);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fIn .25s;}
.lvup-card{background:linear-gradient(135deg,#fff,#f5f3ff);border-radius:24px;padding:40px 32px;text-align:center;max-width:340px;width:90%;animation:popIn .4s;border:3px solid #c4b5fd;box-shadow:0 20px 60px rgba(91,33,182,.45);}
.lvup-ic{font-size:4rem;margin-bottom:10px;}
.lvup-h{font-size:1.55rem;font-weight:800;color:#4c1d95;margin-bottom:6px;}
.lvup-s{font-size:.93rem;color:var(--gy);margin-bottom:20px;line-height:1.6;}

/* в”Җв”Җ BADGE TOAST в”Җв”Җ */
.bdg-toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:10px 24px;border-radius:99px;font-size:.85rem;font-weight:700;z-index:9998;pointer-events:none;white-space:nowrap;animation:toastPop .35s,toastFade .35s 2.65s forwards;box-shadow:0 4px 18px rgba(124,58,237,.48);}

/* в”Җв”Җ STREAK BANNER в”Җв”Җ */
.streak-banner{background:linear-gradient(135deg,#f59e0b,#ef4444,#ec4899);color:#fff;border-radius:13px;padding:13px 18px;text-align:center;font-size:1.05rem;font-weight:800;margin-bottom:12px;animation:popIn .3s;box-shadow:0 4px 18px rgba(245,158,11,.38);}

/* в”Җв”Җ ANIMATIONS в”Җв”Җ */
@keyframes fIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastFade{to{opacity:0}}
#ccanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9997;}

/* в”Җв”Җ STUDY GUIDE в”Җв”Җ */
.sg-wrap{display:flex;min-height:calc(100vh - 108px);}
.sg-nav{width:235px;background:#fff;border-right:2px solid var(--bd);padding:16px;overflow-y:auto;flex-shrink:0;}
.sg-nav h3{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--gy);margin-bottom:10px;font-weight:800;}
.lbtn{width:100%;text-align:left;padding:10px 13px;border:none;background:none;cursor:pointer;border-radius:10px;font-size:.84rem;color:var(--tx);margin-bottom:2px;transition:all .13s;display:flex;align-items:center;gap:8px;font-weight:600;}

function render(){
  renderTabs();
  const app=document.getElementById('app');
  if(st.tab===10){app.innerHTML=renderSG();return;}
  if(st.tab===11){app.innerHTML=renderPractice();return;}
  const t=st.tab;
  if(!st.started[t]){app.innerHTML=renderStart(t);return;}
  if(st.sub[t]){app.innerHTML=renderResults(t);return;}
  app.innerHTML=renderTest(t);
  updateGrid(t);
  updateTimer(t);
}

// в”Җв”Җ RESULTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderResults(t){
  const qs=tests[t],ans=st.ans[t];
  let ok=0,ng=0,sk=0;
  qs.forEach((q,i)=>{if(ans[i]===null)sk++;else if(ans[i]===q.ans)ok++;else ng++;});
  const pct=Math.round(ok/55*100);
  const cc=pct>=80?'var(--gr)':pct>=60?'var(--yl)':'var(--rd)';
  const items=qs.map((q,i)=>{
    const ua=ans[i];
    const st2=ua===null?'sk':ua===q.ans?'ok':'ng';
    const badge=st2==='ok'?'<span class="badge bok">вң“ Correct</span>':st2==='ng'?'<span class="badge bng">вң— Wrong</span>':'<span class="badge bsk">вҖ” Skipped</span>';
    return`<div class="ri ${st2}">
      <div class="rihdr"><div class="riqn">Q${i+1}</div>${badge}</div>
      ${q.c?`<div style="font-size:.78rem;color:#7c4700;font-style:italic;margin-bottom:7px">Given: ${q.c}</div>`:''}
      <div class="ricmp">
        <div class="rcol rca"><div class="rclbl">Column A</div>${q.a}</div>
        <div class="rcol rcb"><div class="rclbl">Column B</div>${q.b}</div>
      </div>
      <div style="font-size:.8rem;margin-bottom:6px">Correct: <strong style="color:var(--gr)">${q.ans} вҖ” ${CH.find(c=>c.l===q.ans).t}</strong>${ua&&ua!==q.ans?` В· Your answer: <span style="color:var(--rd)">${ua}</span>`:''}</div>
      <div class="rexp">${q.exp}</div>
    </div>`;
  }).join('');
  return`<div class="results">
    <div class="scorecard">
      <div class="circle" style="background:${cc}22;border:4px solid ${cc}">
        <div class="pct" style="color:${cc}">${pct}%</div>
        <div style="font-size:.8rem;color:${cc}">${ok}/55</div>
      </div>
      <h2 style="margin-bottom:4px;color:#4c1d95;font-weight:800">рҹҺү Test ${t+1} Complete!</h2>
      <div class="stats">
        <div class="stat"><div class="stn" style="color:var(--gr)">${ok}</div><div class="stl">Correct</div></div>
        <div class="stat"><div class="stn" style="color:var(--rd)">${ng}</div><div class="stl">Wrong</div></div>
        <div class="stat"><div class="stn" style="color:var(--yl)">${sk}</div><div class="stl">Skipped</div></div>
      </div>
      <button class="btn btn-o" style="margin-top:14px" onclick="retake(${t})">рҹ”„ Try This Test Again</button>
    </div>
    <h3 style="margin-bottom:10px;color:#4c1d95;font-weight:800">рҹ”Қ Check Every Question</h3>
    <div class="rlist">${items}</div>
  </div>`;
}

function updateGrid(t){
  const g=document.getElementById('qgrid');if(!g)return;
  g.innerHTML=tests[t].map((_,i)=>`<div class="qb${i===st.q?' cur':''}${st.ans[t][i]!==null?' ans':''}" onclick="go(${i})">${i+1}</div>`).join('');
}
function updateTimer(t){
  const d=document.getElementById('tmrval'),b=document.getElementById('tmrbox');if(!d)return;
  const s=st.timers[t],m=Math.floor(s/60),sec=s%60;
  d.textContent=`${m}:${String(sec).padStart(2,'0')}`;
  if(b){b.classList.remove('warn','dng');if(s<=60)b.classList.add('dng');else if(s<=300)b.classList.add('warn');}
}
function startTest(t){
  st.started[t]=true;
  if(!st.ivs[t]){
    st.ivs[t]=setInterval(()=>{
      if(st.sub[t])return;
      st.timers[t]--;
      updateTimer(t);
      if(st.timers[t]<=0){clearInterval(st.ivs[t]);submitTest(t);}
    },1000);
  }
  render();
}
function go(i){if(i<0||i>54)return;st.q=i;render();}
function pick(l){
  const t=st.tab;
  st.ans[t][st.q]=l;
  render();
  if(st.q<54)setTimeout(()=>{st.q++;render();},350);
}
function confirmSub(t){
  const sk=st.ans[t].filter(x=>x===null).length;
  if(sk>0&&!confirm(`You have ${sk} question(s) you didn't answer yet. Do you want to submit anyway?`))return;
  submitTest(t);
}
function submitTest(t){st.sub[t]=true;if(st.ivs[t])clearInterval(st.ivs[t]);render();}
function retake(t){
  st.ans[t]=new Array(tests[t].length).fill(null);
  st.sub[t]=false;st.timers[t]=22*60;st.q=0;st.started[t]=false;
  if(st.ivs[t]){clearInterval(st.ivs[t]);st.ivs[t]=null;}
  render();
}

function launchConfetti(n=100,dur=2200){
  let c=document.getElementById('ccanvas');
  if(!c){c=document.createElement('canvas');c.id='ccanvas';document.body.appendChild(c);}
  c.width=innerWidth;c.height=innerHeight;
  const ctx=c.getContext('2d');
  const cols=['#7c3aed','#4f46e5','#059669','#d97706','#0891b2','#e11d48','#f59e0b'];
  const ps=Array.from({length:n},()=>({
    x:Math.random()*c.width,y:Math.random()*-c.height*0.5-10,
    w:7+Math.random()*7,h:4+Math.random()*5,col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*360,vy:2.5+Math.random()*4,vx:(Math.random()-.5)*3,vr:Math.random()*8-4
  }));
  const t0=Date.now();
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.05;
    });
    if(Date.now()-t0<dur)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height);
  }
  draw();
}

function checkAndAwardBadges(sess,totalQ,totalCorrect,xp){
  const badges=lsGet('scat_badges',[]);const newOnes=[];
  const chk=(id,cond)=>{if(cond&&!badges.includes(id)){badges.push(id);newOnes.push(id);}};
  const ta=(code,min,pct)=>{const b=sess.byTopic[code];return b&&b.t>=min&&b.c/b.t>=pct;};
  chk('first',  totalCorrect>=1);
  chk('streak5',sess.bestStreak>=5||sess.streak>=5);
  chk('streak10',sess.bestStreak>=10||sess.streak>=10);
  chk('nohints',sess.noHintStreak>=10);
  chk('comeback',sess.postWrongStreak>=5);
  chk('q50',    totalQ>=50);  chk('q100',totalQ>=100);  chk('q250',totalQ>=250);
  chk('pyth',ta('PY',5,.8));chk('frac',ta('FR',5,.8));chk('alg',ta('AL',5,.8));
  chk('geo',ta('GE',5,.8));chk('exp',ta('EX',5,.8));
  chk('perfect',sess.total>=10&&sess.correct===sess.total);
  chk('legend',xp>=2000);
  if(newOnes.length){
    lsSet('scat_badges',badges);
    newOnes.forEach((id,i)=>{const def=BADGE_DEFS.find(b=>b.id===id);if(def)setTimeout(()=>showBadgeToast(def),600+i*900);});
  }
}

function buildQueue(){
  const f=st.prac.topicFilter;
  const q=[];
  tests.forEach((t,ti)=>t.forEach((qo,qi)=>{
    if(f.includes(qmeta[ti][qi][0]))q.push({ti,qi});
  }));
  // Fisher-Yates shuffle
  for(let i=q.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[q[i],q[j]]=[q[j],q[i]];}
  return q;
}

function startPractice(){
  const p=st.prac;
  p.queue=buildQueue();
  if(!p.queue.length){alert('Pick at least one topic to practice first!');return;}
  p.pos=0;p.hintsShown=0;p.answered=false;p.chosen=null;p.stopped=false;
  p.sess={total:0,correct:0,wrong:0,hintsNeeded:0,streak:0,bestStreak:0,byTopic:{},noHintStreak:0,postWrongStreak:0,lastWasWrong:false,xpEarned:0};
  p.active=true;
  render();
}

function toggleTopic(code){
  const f=st.prac.topicFilter;
  const idx=f.indexOf(code);
  if(idx>=0){if(f.length>1)f.splice(idx,1);}
  else f.push(code);
  render();
}

function pracPick(letter){
  const p=st.prac;
  if(p.answered)return;
  const {ti,qi}=p.queue[p.pos];
  const q=tests[ti][qi];
  p.chosen=letter;
  p.answered=true;
  const correct=(letter===q.ans);
  const s=p.sess;
  s.total++;

  if(correct){
    s.correct++;s.streak++;
    if(s.streak>s.bestStreak)s.bestStreak=s.streak;
    // no-hint streak: consecutive correct with zero hints
    if(p.hintsShown===0)s.noHintStreak++;else s.noHintStreak=0;
    // comeback streak: consecutive correct after a wrong answer
    if(s.lastWasWrong||s.postWrongStreak>0)s.postWrongStreak++;
    s.lastWasWrong=false;
  } else {
    s.wrong++;s.streak=0;s.noHintStreak=0;s.postWrongStreak=0;s.lastWasWrong=true;
  }
  if(p.hintsShown>0)s.hintsNeeded++;

  const code=qmeta[ti][qi][0];
  if(!s.byTopic[code])s.byTopic[code]={c:0,t:0};
  s.byTopic[code].t++;
  if(correct)s.byTopic[code].c++;

  // в”Җв”Җ XP + badges + confetti в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const totalQ=lsGet('scat_total_q',0)+1;
  lsSet('scat_total_q',totalQ);
  if(correct){
    let xpEarned=10;                               // base correct
    if(p.hintsShown===0)xpEarned+=5;              // no-hint bonus
    if(s.streak>=10)xpEarned+=3;                  // hot-streak bonus
    else if(s.streak>=5)xpEarned+=3;
    s.xpEarned+=xpEarned;
    const totalC=lsGet('scat_total_c',0)+1;
    lsSet('scat_total_c',totalC);
    const totalXP=awardXP(xpEarned);
    // streak-milestone confetti рҹҺү
    if(STREAK_MSGS[s.streak])launchConfetti(80,2000);
    checkAndAwardBadges(s,totalQ,totalC,totalXP);
  }
  render();
}

    ${topicRows?`<div class="psum-card"><h3 style="margin-bottom:12px">Accuracy by Topic</h3>${topicRows}</div>`:''}
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-p" onclick="resetPractice()">рҹ”„ New Session</button>
      <button class="btn btn-o" onclick="setTab(10)">рҹ“ҡ Open Study Guide</button>
    </div>
  </div>`;
}

render();

// в”Җв”Җ SERVICE WORKER + UPDATE LOGIC в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let swReg = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      swReg = reg;

      // If a new SW is already waiting on first load, show the banner
      if (reg.waiting) showUpdateBanner();

      // Detect new SW found while page is open
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });
    }).catch(err => console.log('SW error:', err));

    // When SW takes control (after skip waiting), reload
    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
  });
}

function showUpdateBanner() {
  document.getElementById('updBanner').classList.add('show');
  document.getElementById('updLabel').textContent = 'Update Ready!';
}

function applyUpdate() {
  if (swReg && swReg.waiting) {
    swReg.waiting.postMessage({ type: 'SKIP_WAITING' });
  } else {
    window.location.reload(true);
  }
}

async function checkForUpdates() {
  const btn = document.getElementById('updBtn');
  const icon = document.getElementById('updIcon');
  const label = document.getElementById('updLabel');
  btn.classList.add('spinning');
  label.textContent = 'CheckingвҖҰ';

  try {
    if (swReg) {
      await swReg.update();
      if (swReg.waiting) {
        showUpdateBanner();
        label.textContent = 'Update Ready!';
      } else {
        label.textContent = 'Up to date вң“';
        setTimeout(() => { label.textContent = 'Update App'; }, 2500);
      }
    } else {
      // Fallback: hard reload bypassing cache
      window.location.reload(true);
    }
  } catch(e) {
    label.textContent = 'Update App';
  }
  btn.classList.remove('spinning');
}
</script>
