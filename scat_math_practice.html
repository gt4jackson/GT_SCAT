<!DOCTYPE html>

<style>

.tab{padding:12px 14px;cursor:pointer;font-weight:600;font-size:.78rem;border-bottom:3px solid transparent;color:var(--gy);white-space:nowrap;transition:all .15s;}

.rules{text-align:left;background:var(--gyl);border-radius:8px;padding:14px 18px;margin:14px 0;font-size:.83rem;line-height:1.8;}

.ref-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:16px;}

.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.lg-card{background:#fff;border-radius:11px;padding:18px;cursor:pointer;border:2px solid var(--bd);transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06);}

const tests=[

const lessons=[
{id:'overview',icon:'рҹҺҜ',title:'How SCAT Math Works',tag:'Strategy',
 intro:'The SCAT Quantitative section compares two columns. You never need to find an exact answer вҖ” just decide which side is bigger, or whether it\'s impossible to tell. The four choices are always identical on every question.',
 tip:'Key insight: Questions where you can\'t determine the answer because the result <em>changes</em> depending on unknown values вҶ’ answer is <strong>D</strong>. Questions where you can work out a definite comparison вҶ’ A, B, or C.',
 tipList:['A: Column A is greater','B: Column B is greater','C: The two quantities are equal','D: The relationship cannot be determined'],
 examples:[
  {cond:'',a:'3 Г— 4 + 2',b:'4 Г— 3 + 2',ans:'C',why:'Both = 14. Multiplication is commutative, so 3Г—4=4Г—3. You can see this without calculating.'},
  {cond:'x + y = 10',a:'x',b:'5',ans:'D',why:'x could be 3 (B wins), 5 (equal), or 8 (A wins). The condition doesn\'t pin down x, so the relationship cannot be determined.'},
 ],
 mistake:'Don\'t rush to D just because there\'s a variable. If the condition fully determines the variable (e.g., "x = 3"), you can compute exactly.'},
{id:'manipulate',icon:'вҡ–пёҸ',title:'The Manipulation Rules',tag:'Strategy',
 intro:'You can do math to BOTH columns equally without changing which side is bigger вҖ” as long as you follow the rules. This often simplifies the comparison dramatically.',
 tip:'You may: (1) Add or subtract the same value to both sides. (2) Multiply or divide both sides by the same <em>positive</em> number. You may NOT: multiply or divide by a negative (flips the sign!), or multiply by a variable unless you know its sign.',
 tipList:null,
 examples:[
  {cond:'',a:'2x + 7',b:'x + 10 (given x = 2)',ans:'B',why:'Subtract x from both sides: x+7 vs 10. Subtract 7: x vs 3. With x=2, Column B wins.'},
  {cond:'',a:'aВІ + a',b:'a(a+1)',ans:'C',why:'Factor Column A: aВІ+a = a(a+1). Now both columns are identical вҖ” always equal.'},
 ],
 mistake:'Never multiply both columns by an expression that could be positive or negative (like a variable) unless you\'ve confirmed its sign. That would change which answer is correct.'},
{id:'pluggin',icon:'рҹ”ў',title:'The "D" Strategy вҖ” Plug In Numbers',tag:'Strategy',
 intro:'Answer D means the relationship changes depending on the value of an unknown. The fastest way to check is to test two numbers that might give different results.',
 tip:'Magic test numbers: try 0, 1, 2, вҲ’1, and 1/2. If you get TWO DIFFERENT outcomes (A wins sometimes, B wins other times, or equal vs not equal), the answer is D.',

  {cond:'n is a positive integer',a:'nВІ',b:'2n',ans:'D',why:'n=1: 1<2 (B). n=2: 4=4 (C). n=3: 9>6 (A). Three different outcomes вҶ’ D.'},
  {cond:'x > 1',a:'x + 2',b:'2x',ans:'D',why:'x=1.5: 3.5>3 (A). x=2: 4=4 (C). x=3: 5<6 (B). Changes вҶ’ D.'},
 ],
 mistake:'A common mistake: seeing a variable and immediately guessing D without testing. Many variable questions have a definite answer вҖ” always test first!'},
{id:'estimation',icon:'рҹ’Ў',title:'Don\'t Calculate вҖ” Estimate & Compare',tag:'Strategy',
 intro:'Many SCAT questions are designed so you can compare without fully computing. Look for shortcuts before reaching for pencil and paper.',
 tip:'Shortcuts that often work without full calculation: (1) Pythagorean triples вҖ” spot a triple and you know the third side instantly. (2) Difference of squares: (a+b)(aвҲ’b) = aВІвҲ’bВІ. (3) Percentage tricks вҖ” convert to fractions first.',
 tipList:['3-4-5, 5-12-13, 8-15-17, 7-24-25, 9-40-41 are triples to memorize','(nвҲ’1)(n+1) = nВІвҲ’1 is always slightly less than nВІ','ab% of c = ac% of b (percentages commute!)'],
 examples:[
  {cond:'',a:'23Г—17',b:'24Г—16',ans:'A',why:'Think of it as (20+3)(20вҲ’3) vs (20+4)(20вҲ’4) = 400вҲ’9 vs 400вҲ’16. No multiplication needed!'},
  {cond:'',a:'45% of 80',b:'80% of 45',ans:'C',why:'Percentages commute! a% of b always equals b% of a. Both = 36.'},

{id:'pemdas',icon:'рҹ“җ',title:'Order of Operations (PEMDAS)',tag:'Concept',
 intro:'SCAT often tests whether you apply the order of operations correctly. Many wrong answers come from adding before multiplying, or ignoring parentheses.',
 tip:'PEMDAS: Parentheses вҶ’ Exponents вҶ’ Multiply/Divide (left to right) вҶ’ Add/Subtract (left to right). Exponents come BEFORE multiplication!',
 tipList:['3+4ВІ = 3+16 = 19 (NOT 7ВІ=49)','(3+4)ВІ = 7ВІ = 49','2Г—3ВІ = 2Г—9 = 18 (NOT 6ВІ=36)'],

  {cond:'',a:'3 + 4ВІ',b:'(3 + 4)ВІ',ans:'B',why:'Left: 3+16=19. Right: 7ВІ=49. Always do exponents before adding.'},
  {cond:'',a:'6 вҲ’ 2ВІ Г— 3',b:'вҲ’6',why:'Left: 6вҲ’4Г—3=6вҲ’12=вҲ’6. Right: вҲ’6. Equal! Order: exponent first, then multiply, then subtract.',ans:'C'},
 ],
 mistake:'The most common PEMDAS trap: forgetting that 3+4ВІ вү  7ВІ. The exponent only applies to the base (4), not to the sum.'},
{id:'fractions',icon:'ВҪ',title:'Comparing Fractions Fast',tag:'Concept',
 intro:'Fraction comparison questions appear throughout the SCAT. Having a fast comparison method is essential when the fractions don\'t share an obvious relationship.',

 tipList:['Benchmark fractions: 1/4=0.25, 1/3вүҲ0.33, 1/2=0.5, 2/3вүҲ0.67, 3/4=0.75','If numerators are equal, the smaller denominator makes the bigger fraction','If denominators are equal, the bigger numerator makes the bigger fraction'],

{id:'exponents',icon:'рҹ”Ӣ',title:'Exponents & Powers',tag:'Concept',
 intro:'Exponent questions test both your memorized values and your ability to apply the rules of exponents to simplify before comparing.',

 tipList:['Powers of 2: 2,4,8,16,32,64,128,256,512,1024','Powers of 3: 3,9,27,81,243','Squares: 1,4,9,16,25,36,49,64,81,100,121,144,169,196,225','(вҲ’x)ВІ is always positive; (вҲ’x)Ві is always negative'],

{id:'geometry',icon:'рҹ“Ҹ',title:'Geometry Essentials',tag:'Concept',

{id:'pyth',icon:'рҹ“җ',title:'Pythagorean Triples',tag:'Concept',

{id:'algebra',icon:'рҹ”Ө',title:'Algebraic Identities',tag:'Concept',
 intro:'A handful of algebraic identities appear repeatedly on the SCAT. Recognizing them lets you compare columns instantly without expanding.',

 tipList:['(a+b)ВІ = aВІ+2ab+bВІ','(aвҲ’b)ВІ = aВІвҲ’2ab+bВІ','(a+b)(aвҲ’b) = aВІвҲ’bВІ','a(b+c) = ab+ac (distributive)','(a/b)ВІ = aВІ/bВІ'],

 intro:'Prime numbers, factors, GCF, LCM, and remainders appear throughout the SCAT. A strong number theory foundation gives you quick answers.',

 tipList:['Divisibility by 3: digit sum divisible by 3','Divisibility by 9: digit sum divisible by 9','LCMГ—GCF = product of the two numbers (for 2 numbers)','GCF: highest power each prime factor has in COMMON','LCM: highest power each prime factor has in EITHER number'],
 examples:[
  {cond:'',a:'Number of factors of 36',b:'9',ans:'C',why:'36=2ВІГ—3ВІ, factors=(2+1)(2+1)=9. List: 1,2,3,4,6,9,12,18,36.'},
  {cond:'',a:'Remainder when 1000Г·7',b:'6',ans:'C',why:'1000=142Г—7+6. Remainder=6.'},
 ],
 mistake:'GCF and LCM are commonly confused. GCF (greatest common factor) is always вүӨ either number. LCM (least common multiple) is always вүҘ either number.'},
];

// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const st={
  tab:0, // 0вҖ“9 = tests, 10 = study guide
  q:0,
  ans:tests.map(t=>new Array(t.length).fill(null)),
  sub:new Array(tests.length).fill(false),
  timers:new Array(tests.length).fill(22*60),
  ivs:new Array(tests.length).fill(null),
  started:new Array(tests.length).fill(false),
  lesson:null,
};

// в”Җв”Җ RENDER TABS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderTabs(){
  const tc=document.getElementById('tabs');
  tc.innerHTML=tests.map((_,i)=>`<div class="tab${st.tab===i?' on':''}" onclick="setTab(${i})">Test ${i+1}</div>`).join('')
    +`<div class="tab sg${st.tab===10?' on':''}" onclick="setTab(10)">рҹ“ҡ Study Guide</div>`;
}

// в”Җв”Җ MAIN RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function render(){
  renderTabs();
  const app=document.getElementById('app');
  if(st.tab===10){app.innerHTML=renderSG();return;}
  const t=st.tab;
  if(!st.started[t]){app.innerHTML=renderStart(t);return;}
  if(st.sub[t]){app.innerHTML=renderResults(t);return;}
  app.innerHTML=renderTest(t);
  updateGrid(t);
  updateTimer(t);
}

function setTab(i){st.tab=i;st.q=0;render();}

// в”Җв”Җ START SCREEN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderStart(t){
  return`<div class="start"><div class="startcard">
    <h2>SCAT Math В· Test ${t+1}</h2>
    <p>Quantitative Comparison В· 55 Questions В· 22 Minutes</p>
    <div class="rules"><strong>For each question compare Column A and Column B:</strong><br>
    A вҖ” Column A is greater<br>B вҖ” Column B is greater<br>C вҖ” The two quantities are equal<br>D вҖ” Cannot be determined from the information given<br><br>
    Any given condition (shown in amber) applies to both columns.</div>
    <p style="color:var(--gy);font-size:.82rem">Timer starts when you click Begin. You can skip and return to any question.</p>
    <button class="btn btn-p" style="width:100%;margin-top:10px;padding:13px" onclick="startTest(${t})">Begin Test ${t+1}</button>
  </div></div>`;
}

// в”Җв”Җ TEST SCREEN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderTest(t){
  const q=tests[t][st.q];
  const a=st.ans[t][st.q];
  const done=st.ans[t].filter(x=>x!==null).length;
  return`<div class="main">
    <div class="sb">
      <div class="tmr" id="tmrbox"><div class="tmr-lbl">Time Left</div><div class="tmr-val" id="tmrval">--:--</div></div>
      <div class="pgbar"><div class="pgfill" style="width:${done/55*100}%"></div></div>
      <div class="pglbl">${done}/55 answered</div>
      <h3 style="margin-top:10px">Questions</h3>
      <div class="qgrid" id="qgrid"></div>
    </div>
    <div class="qa">
      <div class="qcard">
        <div class="qnum">Question ${st.q+1} of 55</div>
        ${q.c?`<div class="qcond">Given: ${q.c}</div>`:''}
        <table class="ctbl">
          <tr><th>Column A</th><th style="border:none;background:transparent;width:36px"></th><th>Column B</th></tr>
          <tr><td class="ca">${q.a}</td><td class="vs">vs</td><td class="cb">${q.b}</td></tr>
        </table>
        <div class="choices">
          ${CH.map(c=>`<button class="ch${a===c.l?' sel':''}" onclick="pick('${c.l}')">
            <div class="chl">${c.l}</div><div>${c.t}</div></button>`).join('')}
        </div>
      </div>
      <div class="navrow">
        <button class="btn btn-o" onclick="go(${st.q-1})" ${st.q===0?'disabled':''}>вҶҗ Prev</button>
        <button class="btn btn-o" onclick="go(${st.q+1})" ${st.q===54?'disabled':''}>Next вҶ’</button>
        <div class="sp"></div>
        <button class="btn btn-d" onclick="confirmSub(${t})">Submit Test</button>
      </div>
    </div>
  </div>`;
}

// в”Җв”Җ RESULTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderResults(t){
  const qs=tests[t],ans=st.ans[t];
  let ok=0,ng=0,sk=0;
  qs.forEach((q,i)=>{if(ans[i]===null)sk++;else if(ans[i]===q.ans)ok++;else ng++;});
  const pct=Math.round(ok/55*100);
  const cc=pct>=80?'var(--gr)':pct>=60?'var(--yl)':'var(--rd)';
  const items=qs.map((q,i)=>{
    const ua=ans[i];
    const st2=ua===null?'sk':ua===q.ans?'ok':'ng';
    const badge=st2==='ok'?'<span class="badge bok">вң“ Correct</span>':st2==='ng'?'<span class="badge bng">вң— Wrong</span>':'<span class="badge bsk">вҖ” Skipped</span>';
    return`<div class="ri ${st2}">
      <div class="rihdr"><div class="riqn">Q${i+1}</div>${badge}</div>
      ${q.c?`<div style="font-size:.78rem;color:#7c4700;font-style:italic;margin-bottom:7px">Given: ${q.c}</div>`:''}
      <div class="ricmp">
        <div class="rcol rca"><div class="rclbl">Column A</div>${q.a}</div>
        <div class="rcol rcb"><div class="rclbl">Column B</div>${q.b}</div>
      </div>
      <div style="font-size:.8rem;margin-bottom:6px">Correct: <strong style="color:var(--gr)">${q.ans} вҖ” ${CH.find(c=>c.l===q.ans).t}</strong>${ua&&ua!==q.ans?` В· Your answer: <span style="color:var(--rd)">${ua}</span>`:''}</div>
      <div class="rexp">${q.exp}</div>
    </div>`;
  }).join('');
  return`<div class="results">
    <div class="scorecard">
      <div class="circle" style="background:${cc}22;border:4px solid ${cc}">
        <div class="pct" style="color:${cc}">${pct}%</div>
        <div style="font-size:.8rem;color:${cc}">${ok}/55</div>
      </div>
      <h2 style="margin-bottom:4px">Test ${t+1} Complete!</h2>
      <div class="stats">
        <div class="stat"><div class="stn" style="color:var(--gr)">${ok}</div><div class="stl">Correct</div></div>
        <div class="stat"><div class="stn" style="color:var(--rd)">${ng}</div><div class="stl">Wrong</div></div>
        <div class="stat"><div class="stn" style="color:var(--yl)">${sk}</div><div class="stl">Skipped</div></div>
      </div>
      <button class="btn btn-o" style="margin-top:14px" onclick="retake(${t})">Retake Test</button>
    </div>
    <h3 style="margin-bottom:10px">Review All Questions</h3>
    <div class="rlist">${items}</div>
  </div>`;
}

// в”Җв”Җ STUDY GUIDE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderSG(){
  if(st.lesson===null){return renderSGHome();}
  const l=lessons.find(x=>x.id===st.lesson);
  if(!l)return renderSGHome();
  const exHtml=l.examples.map(e=>`<div class="ex-card">
    <div class="ex-head">Worked Example</div>
    ${e.cond?`<div style="font-size:.8rem;color:#7c4700;font-style:italic;margin-bottom:8px">Given: ${e.cond}</div>`:''}
    <div class="ex-cols">
      <div class="ex-col ex-cola"><div class="ex-col-lbl">Column A</div>${e.a}</div>
      <div class="ex-col ex-colb"><div class="ex-col-lbl">Column B</div>${e.b}</div>
    </div>
    <div class="ex-ans">Answer: ${e.ans} вҖ” ${CH.find(c=>c.l===e.ans).t}</div>
    <div class="ex-why">${e.why}</div>
  </div>`).join('');
  const listHtml=l.tipList?'<ul>'+l.tipList.map(x=>`<li>${x}</li>`).join('')+'</ul>':'';
  return`<div class="sg-wrap">
    <div class="sg-nav">
      <h3>Lessons</h3>
      <button class="lbtn" onclick="st.lesson=null;render()"><span class="icon">рҹҸ </span>All Lessons</button>
      ${lessons.map(x=>`<button class="lbtn${st.lesson===x.id?' on':''}" onclick="openLesson('${x.id}')">
        <span class="icon">${x.icon}</span>${x.title}</button>`).join('')}
    </div>
    <div class="sg-content">
      <div class="lesson-card">
        <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7c3aed;margin-bottom:6px">${l.tag}</div>
        <h2>${l.icon} ${l.title}</h2>
        <p class="lesson-intro">${l.intro}</p>
        <div class="tip-box">
          <div class="tip-lbl">Key Rule</div>
          <p>${l.tip}</p>
          ${listHtml}
        </div>
        <h3 style="font-size:.9rem;margin-bottom:10px;color:var(--bl)">Worked Examples</h3>
        <div class="examples-grid">${exHtml}</div>
        <div class="mistake-box">
          <div class="ml">вҡ  Common Mistake</div>
          <p>${l.mistake}</p>
        </div>
      </div>
    </div>
  </div>`;
}

function renderSGHome(){
  const cards=lessons.map(l=>`<div class="lg-card" onclick="openLesson('${l.id}')">
    <div class="lc-icon">${l.icon}</div>
    <h3>${l.title}</h3>
    <p>${l.tag} вҖ” click to open</p>
  </div>`).join('');
  return`<div class="sg-wrap">
    <div class="sg-nav">
      <h3>Lessons</h3>
      <button class="lbtn on"><span class="icon">рҹҸ </span>All Lessons</button>
      ${lessons.map(x=>`<button class="lbtn" onclick="openLesson('${x.id}')">
        <span class="icon">${x.icon}</span>${x.title}</button>`).join('')}
    </div>
    <div class="sg-content">
      <div class="sg-welcome">
        <h2>рҹ“ҡ SCAT Math Study Guide</h2>
        <p>12 lessons covering strategies and concepts you need to ace the quantitative section. Open any lesson to see tips, worked examples, and common mistakes to avoid.</p>
      </div>
      <div class="lesson-grid">${cards}</div>
    </div>
  </div>`;
}

function openLesson(id){st.lesson=id;render();}

// в”Җв”Җ ACTIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function updateGrid(t){
  const g=document.getElementById('qgrid');if(!g)return;
  g.innerHTML=tests[t].map((_,i)=>`<div class="qb${i===st.q?' cur':''}${st.ans[t][i]!==null?' ans':''}" onclick="go(${i})">${i+1}</div>`).join('');
}
function updateTimer(t){
  const d=document.getElementById('tmrval'),b=document.getElementById('tmrbox');if(!d)return;
  const s=st.timers[t],m=Math.floor(s/60),sec=s%60;
  d.textContent=`${m}:${String(sec).padStart(2,'0')}`;
  if(b){b.classList.remove('warn','dng');if(s<=60)b.classList.add('dng');else if(s<=300)b.classList.add('warn');}
}
function startTest(t){
  st.started[t]=true;
  if(!st.ivs[t]){
    st.ivs[t]=setInterval(()=>{
      if(st.sub[t])return;
      st.timers[t]--;
      updateTimer(t);
      if(st.timers[t]<=0){clearInterval(st.ivs[t]);submitTest(t);}
    },1000);
  }
  render();
}
function go(i){if(i<0||i>54)return;st.q=i;render();}
function pick(l){
  const t=st.tab;
  st.ans[t][st.q]=l;
  render();
  if(st.q<54)setTimeout(()=>{st.q++;render();},350);
}
function confirmSub(t){
  const sk=st.ans[t].filter(x=>x===null).length;
  if(sk>0&&!confirm(`${sk} unanswered question(s). Submit anyway?`))return;
  submitTest(t);
}
function submitTest(t){st.sub[t]=true;if(st.ivs[t])clearInterval(st.ivs[t]);render();}
function retake(t){
  st.ans[t]=new Array(tests[t].length).fill(null);
  st.sub[t]=false;st.timers[t]=22*60;st.q=0;st.started[t]=false;
  if(st.ivs[t]){clearInterval(st.ivs[t]);st.ivs[t]=null;}
  render();
}

render();
</script>
</body>
</html>
